# Unitree G1 Dex1 (Sim) - Stack-the-cubes datasets
# Raw observation.state / action layout (16 dims):
#   [0:7)   left arm joints  (shoulder pitch/roll/yaw, elbow, wrist roll/pitch/yaw)
#   [7:14)  right arm joints
#   [14:15) left gripper
#   [15:16) right gripper
states:
  - observation.state.arm.position:
      origin_keys:
        - observation.state:       # left arm joints [0:7)
            start: 0
            end: 7
        - observation.state:       # right arm joints [7:14)
            start: 7
            end: 14

  - observation.state.effector.position:
      origin_keys:
        - observation.state:       # left gripper [14:15)
            start: 14
            end: 15
        - observation.state:       # right gripper [15:16)
            start: 15
            end: 16

actions:
  - action.arm.position:
      origin_keys:
        - action:
            start: 0
            end: 7
        - action:
            start: 7
            end: 14
      subtract_state: False

  - action.effector.position:
      origin_keys:
        - action:
            start: 14
            end: 15
        - action:
            start: 15
            end: 16
      subtract_state: False

images:
  - observation.images.camera_top:
      origin_keys: observation.images.cam_left_high
  - observation.images.camera_wrist_left:
      origin_keys: observation.images.cam_left_wrist
  - observation.images.camera_wrist_right:
      origin_keys: observation.images.cam_right_wrist

norm_stats: assets/norm_stats/stackcubes.json
