data:
  cameras:
  - camera_top
  - camera_wrist_left
  - camera_wrist_right
  chat_template: default
  data_name: multi
  data_root: null
  data_tag: default
  data_type: conversation
  dataloader_type: native
  datasets_type: vla
  drop_last: true
  image_augment: false
  image_keys: images
  img_size: 256
  joints:
  - '{''arm.position'': 14}'
  - '{''end.position'': 14}'
  - '{''effector.position'': 2}'
  max_seq_len: 2048
  norm_stats_file: assets/norm_stats/stackcubes_v1.json
  norm_type:
  - '{''arm.position'': ''bounds_99_woclip''}'
  - '{''end.position'': ''bounds_99_woclip''}'
  - '{''effector.position'': ''bounds_99_woclip''}'
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4
  prompt_type: global
  robot_config_root: ./configs/robot_configs
  source_name: null
  state_norm_type: none
  text_keys: messages
  train_path: assets/training_data/stackcubes_v1.txt
  train_size: 10000000
  use_future_image: true
model:
  adanorm_time: true
  attn_implementation: flash_attention_2
  basic_modules: []
  config_key: LingbotVLAV2Config
  config_path: /scratch/cy65664/workDir/lingbot-vla-v2/pretrained/lingbot-vla-v2-6b
  decoders: {}
  encode_target: false
  encoders: {}
  final_norm_adanorm: false
  force_use_huggingface: false
  incremental_training: false
  input_encoder: encoder
  model_path: /scratch/cy65664/workDir/lingbot-vla-v2/pretrained/lingbot-vla-v2-6b
  moe_implementation: fused
  output_encoder: decoder
  post_training: true
  tokenizer_path: /scratch/cy65664/workDir/lingbot-vla-v2/pretrained/Qwen3-VL-4B-Instruct
  use_lm_head: false
  vit_attn_implementation: flash_attention_2
  vlm_repo_id: null
  vocab_size: 0
train:
  action_dim: 55
  action_fp32: false
  activation_gpu_limit: 0.0
  align_params:
    depth:
      block_future_depth_to_action: true
      detach_future_image_feats: true
      dim_head: 32
      dim_out: 1024
      ff_mult: 1
      input_size: 224
      model_type: MoRGBD
      moge_path: /scratch/cy65664/workDir/lingbot-vla-v2/pretrained/moge-2-vitb-normal/model.pt
      morgbd_path: /scratch/cy65664/workDir/lingbot-vla-v2/pretrained/lingbot-vla-v2-6b/depth/model.pt
      num_backbone_tokens: 256
      num_heads: 4
      num_layers: 1
      token_size: 16
      use_future_depth: true
    depth_loss_weight: 0.004
    future_depth_loss_weight: 0.004
    llm:
      dim_out: 2560
      image_input_size: 224
      image_token_size: 8
    mode: query
    num_task_tokens: 8
    use_future_video: true
    video:
      attention_mode: flex_block_causal
      block_suffix_to_future_video: true
      ckpt_path: /scratch/cy65664/workDir/lingbot-vla-v2/pretrained/lingbot-vla-v2-6b/dino_video/teacher_step_10000.pth
      cls_loss_type: mse
      cls_loss_weight: 0.2
      cls_pool: last
      config_path: /scratch/cy65664/workDir/lingbot-vla-v2/pretrained/lingbot-vla-v2-6b/dino_video/config.yaml
      cosine_loss_weight: 0.2
      detach_image_feats: true
      dim_head: 32
      dim_out: 1024
      effective_fps: 1.0
      ff_mult: 1
      future_video_loss_weight: 0.004
      input_size: 256
      log_max_samples: 32
      log_scale: 16
      mse_loss_weight: 1.0
      n_blocks: 1
      num_backbone_tokens: 256
      num_future_frames: 1
      num_heads: 4
      num_layers: 1
      share_future_depth_query: true
      use_cls_loss: false
      use_cosine_loss: false
      use_current_patch_loss: true
      use_current_shared_task_proj: true
      use_mse_loss: true
      use_patch_loss: true
      use_shared_future_task_proj: true
      use_smooth_l1_loss: false
      use_warmup_frame: true
    visual_steps: 5000
  allow_partial_checkpoint: false
  async_hf_max_pending: 1
  async_save_hf_weights: false
  attention_implementation: flex_cached
  bias_centering: false
  bias_update_interval: 1
  bias_update_speed: 0.0
  bsz_warmup_init_mbtoken: 200
  bsz_warmup_ratio: 0
  chunk_size: 50
  ckpt_manager: dcp
  context_parallel_size: 1
